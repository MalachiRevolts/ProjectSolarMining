                labels:
                  show: false
                axisBorder:
                  show: false
                axisTicks:
                  show: false
              yaxis:
                show: false
              stroke:
                width: 2.5
                curve: smooth
              grid:
                show: false
            series:
              - entity: sensor.mining_pool_hashrate
                unit: TH
                type: area
