          - type: custom:mushroom-title-card
            title: Mining Pool Statistics
          - type: heading
            icon: ''
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.network_difficulty
                tap_action:
