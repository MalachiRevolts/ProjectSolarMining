            multiline_secondary: true
            tap_action:
              action: none
            icon_tap_action:
              action: none
            features_position: bottom
            hold_action:
              action: more-info
          - type: vertical-stack
            cards:
              - type: entities
                entities:
                  - type: attribute
                    entity: binary_sensor.miner_2
                    name: Power Need
                    icon: mdi:flash
                    attribute: power_need
              - type: entities
                entities:
                  - entity: sensor.miner_2_excess_solar_power_need
                    name: Excess Solar Power Need
                  - entity: sensor.miner_2_shutdown_threshold
                    name: Shutdown Threshold
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    entity: binary_sensor.miner_2_excess_solar_power_met
                    icon: mdi:solar-power
                    color: |
                      {% if is_state(entity, 'on') %}
                        orange
                      {% else %}
                        blue-grey
                      {% endif %}
                    primary: Excess Solar Power Met
                    secondary: >-
                      Turned {{
                      states('binary_sensor.miner_2_excess_solar_power_met') }}
                      {{
                      relative_time(states.binary_sensor.miner_2_excess_solar_power_met.last_changed)
                      }} ago
                    multiline_secondary: true
                    tap_action:
                      action: more-info
                    icon_tap_action:
                      action: none
                  - type: custom:mushroom-template-card
                    entity: binary_sensor.miner_2_shutdown_threshold_met
                    icon: |
                      {% if is_state(entity, 'on') %}
