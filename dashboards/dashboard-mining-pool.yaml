views:
  - type: sections
    title: Overview
    icon: mdi:lan
    sections:
      - type: grid
        cards:
          - type: custom:horizon-card
            moon: false
            refresh_period: 60
            fields:
              sunrise: true
              sunset: true
              dawn: true
              noon: true
              dusk: true
            southern_flip: false
            moon_phase_rotation: -10
          - type: custom:weather-forecast-card
            show_current: false
            show_forecast: true
            default_forecast: hourly
            tap_action:
              action: more-info
            entity: weather.forecast_home
            forecast:
              mode: simple
              show_sun_times: true
              use_color_thresholds: true
              scroll_to_selected: true
              show_attribute_selector: false
            forecast_action:
              tap_action:
                action: toggle-forecast
              hold_action:
                action: select-forecast-attribute
            show_condition_effects: true
          - type: custom:mushroom-title-card
            title: Mining Pool Energy Overview
          - type: gauge
            entity: sensor.mining_pool_green_efficiency_today
            min: 0
            max: 100
            segments:
              - from: 0
                to: 80
                color: '#F44336'
              - from: 80
                to: 100
                color: '#4CAF50'
          - type: custom:apexcharts-card
            update_delay: 5s
            graph_span: 12h
            header:
              show: true
              title: Excess Solar Power
              show_states: true
              colorize_states: true
            apex_config:
              yaxis:
                - decimalsInFloat: 0
              stroke:
                width: 2.5
                curve: stepline
              grid:
                borderColor: gray
                strokeDashArray: 0
            series:
              - entity: sensor.excess_solar_power
                unit: W
                type: area
                color: '#4CAF50'
                opacity: 0.45
                show:
                  name_in_header: false
          - type: custom:apexcharts-card
            update_delay: 5s
            graph_span: 12h
            header:
              show: true
              title: Mining Power Split - Solar vs Grid
              show_states: true
              colorize_states: true
            apex_config:
              yaxis:
                - decimalsInFloat: 0
              stroke:
                width: 2.5
                curve: stepline
              grid:
                borderColor: gray
                strokeDashArray: 0
            series:
              - entity: sensor.mining_pool_solar_power_usage
                name: Solar
                unit: W
                type: area
                color: '#4CAF50'
                opacity: 0.4
                extend_to: now
                fill_raw: last
                show:
                  legend_value: false
                  name_in_header: false
              - entity: sensor.mining_pool_grid_power_usage
                name: Grid
                unit: W
                type: area
                color: '#F44336'
                opacity: 0.4
                invert: true
                extend_to: now
                fill_raw: last
                show:
                  legend_value: false
                  name_in_header: false
          - type: custom:apexcharts-card
            update_delay: 5s
            graph_span: 7d
            span:
              end: day
            header:
              show: true
              title: Mining Daily Energy Split - Solar vs Grid
              show_states: true
              colorize_states: true
            apex_config:
              plotOptions:
                bar:
                  columnWidth: 50%
              stroke:
                width: 1
              grid:
                borderColor: gray
                strokeDashArray: 0
              xaxis:
                labels:
                  format: dd MMM
              yaxis:
                decimalsInFloat: 2
                min: 0
            series:
              - entity: sensor.mining_pool_solar_daily
                name: Solar
                type: column
                color: '#4CAF50'
                unit: kWh
                float_precision: 2
                group_by:
                  func: max
                  duration: 1439m
                show:
                  legend_value: false
                  name_in_header: false
              - entity: sensor.mining_pool_grid_daily
                name: Grid
                type: column
                color: '#F44336'
                unit: kWh
                float_precision: 2
                group_by:
                  func: max
                  duration: 1439m
                show:
                  legend_value: false
                  name_in_header: false
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Mining Pool Miners Overview
          - type: custom:apexcharts-card
            update_delay: 5s
            graph_span: 12h
            header:
              show: true
              title: Miners Online
              show_states: true
              colorize_states: true
            apex_config:
              yaxis:
                decimalsInFloat: 0
                min: 0
                max: 5
              stroke:
                width: 4
                curve: stepline
              grid:
                borderColor: gray
                strokeDashArray: 0
            series:
              - entity: sensor.mining_pool_online_miners
                type: area
                color: '#4CAF50'
                opacity: 0.45
                extend_to: now
                fill_raw: last
                show:
                  name_in_header: false
          - type: custom:waterfall-history-card
            hours: 12
            entities:
              - entity: binary_sensor.miner_1
              - entity: binary_sensor.miner_2
              - entity: binary_sensor.miner_3
            intervals: 48
            interval_value: min
            show_current: false
            show_labels: false
            gradient: false
            inline_layout: false
            color_on: '#4CAF50'
            show_icons: true
            title: ' '
            height: 48
            color_off: '#607D8B'
            color_unknown: '#1C1C1C'
            color_unavailable: '#1C1C1C'
            state_unavailable: Unavailable
            grid_options:
              columns: 12
              rows: auto
      - type: grid
        cards:
          - type: custom:mushroom-template-card
            entity: input_boolean.mining_pool_show_advanced
            icon: mdi:plus-box
            color: blue-grey
            primary: Show Advanced
            multiline_secondary: true
            icon_tap_action:
              action: none
            features_position: bottom
            tap_action:
              action: toggle
            visibility:
              - condition: state
                entity: input_boolean.mining_pool_show_advanced
                state: 'off'
            grid_options:
              columns: full
              rows: auto
          - type: custom:mushroom-template-card
            entity: input_boolean.mining_pool_show_advanced
            icon: mdi:minus-box
            color: blue-grey
            primary: Hide Advanced
            multiline_secondary: true
            icon_tap_action:
              action: none
            features_position: bottom
            tap_action:
              action: toggle
            visibility:
              - condition: state
                entity: input_boolean.mining_pool_show_advanced
                state: 'on'
            grid_options:
              columns: full
              rows: auto
            card_mod:
              style: |
                ha-card {
                  --ha-card-background: color-mix(in srgb, var(--primary-color) 5%, var(--card-background-color));
                }
      - type: grid
        cards:
          - type: custom:mushroom-entity-card
            fill_container: true
            name: Mining Pool Power
            secondary_info: last-changed
            tap_action:
              action: none
            double_tap_action:
              action: none
            icon: mdi:power-plug
            entity: switch.innr_plug_mining_pool
            icon_color: green
            primary_info: name
            hold_action:
              action: more-info
            layout: horizontal
          - type: custom:mushroom-template-card
            entity: automation.mining_pool_regulate
            icon: mdi:tune-vertical-variant
            color: blue-grey
            primary: Mining Pool Regulate
            secondary: >-
              Last run {{
              relative_time(state_attr('automation.mining_pool_regulate',
              'last_triggered')) }} ago
            multiline_secondary: true
            tap_action:
              action: none
            icon_tap_action:
              action: none
            hold_action:
              action: none
            grid_options:
              columns: full
          - type: custom:mushroom-template-card
            entity: input_number.excess_solar_power_remaining
            icon: mdi:numeric
            color: blue-grey
            primary: Excess Solar Power Remaining
            secondary: >-
              Last Value: {{ states('input_number.excess_solar_power_remaining')
              | int }} Last Changed: {{
              relative_time(states.input_number.excess_solar_power_remaining.last_changed)
              }} ago
            multiline_secondary: true
            tap_action:
              action: more-info
            icon_tap_action:
              action: none
            grid_options:
              columns: full
          - type: entities
            entities:
              - type: attribute
                entity: binary_sensor.mining_pool
                name: Excess Solar Power Met Minimum Minutes
                icon: mdi:flash
                attribute: excess_solar_power_met_min_minutes
              - type: attribute
                entity: binary_sensor.mining_pool
                name: Shutdown Threshold Met Minimum Minutes
                icon: mdi:stop-circle-outline
                attribute: excess_solar_power_met_min_minutes
        visibility:
          - condition: state
            entity: input_boolean.mining_pool_show_advanced
            state: 'on'
      - type: grid
        cards:
          - type: heading
            icon: mdi:chip
            heading: Miner 1
          - type: custom:mushroom-template-card
            entity: input_boolean.miner_1_out_of_circuit
            icon: mdi:state-machine
            color: |
              {% if is_state(entity, 'on') %}
                red
              {% else %}
                blue-grey
              {% endif %}
            primary: Out of Circuit
            secondary: >-
              Turned {{ states('input_boolean.miner_1_out_of_circuit') }} {{
              relative_time(states.input_boolean.miner_1_out_of_circuit.last_changed)
              }} ago
            multiline_secondary: true
            tap_action:
              action: none
            icon_tap_action:
              action: none
            features_position: bottom
            hold_action:
              action: more-info
          - type: custom:mushroom-template-card
            entity: input_boolean.miner_1_requirements_override
            icon: mdi:state-machine
            color: |
              {% if is_state(entity, 'on') %}
                orange
              {% else %}
                blue-grey
              {% endif %}
            primary: Requirements Override
            secondary: >-
              Turned {{ states('input_boolean.miner_1_requirements_override') }}
              {{
              relative_time(states.input_boolean.miner_1_requirements_override.last_changed)
              }} ago
            multiline_secondary: true
            tap_action:
              action: none
            icon_tap_action:
              action: none
            features_position: bottom
            hold_action:
              action: more-info
          - type: vertical-stack
            cards:
              - type: entities
                entities:
                  - type: attribute
                    entity: binary_sensor.miner_1
                    name: Power Need
                    icon: mdi:flash
                    attribute: power_need
              - type: entities
                entities:
                  - entity: sensor.miner_1_excess_solar_power_need
                    name: Excess Solar Power Need
                  - entity: sensor.miner_1_shutdown_threshold
                    name: Shutdown Threshold
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    entity: binary_sensor.miner_1_excess_solar_power_met
                    icon: mdi:solar-power
                    color: |
                      {% if is_state(entity, 'on') %}
                        orange
                      {% else %}
                        blue-grey
                      {% endif %}
                    primary: Excess Solar Power Met
                    secondary: >-
                      Turned {{
                      states('binary_sensor.miner_1_excess_solar_power_met') }}
                      {{
                      relative_time(states.binary_sensor.miner_1_excess_solar_power_met.last_changed)
                      }} ago
                    multiline_secondary: true
                    tap_action:
                      action: more-info
                    icon_tap_action:
                      action: none
                  - type: custom:mushroom-template-card
                    entity: binary_sensor.miner_1_shutdown_threshold_met
                    icon: |
                      {% if is_state(entity, 'on') %}
                        mdi:cloud
                      {% else %}
                        mdi:cloud-outline
                      {% endif %}
                    color: blue-grey
                    primary: Shutdown Treshold Met
                    secondary: >-
                      Turned {{
                      states('binary_sensor.miner_1_shutdown_threshold_met') }}
                      {{
                      relative_time(states.binary_sensor.miner_1_shutdown_threshold_met.last_changed)
                      }} ago
                    multiline_secondary: true
                    tap_action:
                      action: more-info
                    icon_tap_action:
                      action: none
            visibility:
              - condition: state
                entity: input_boolean.miner_1_out_of_circuit
                state: 'off'
              - condition: state
                entity: input_boolean.miner_1_requirements_override
                state: 'off'
        visibility:
          - condition: state
            entity: input_boolean.mining_pool_show_advanced
            state: 'on'
