            entity: sensor.mining_pool_best_diff
            name: Mining Pool Best Difficulty
            grid_options:
              columns: full
              rows: 1
    header:
      layout: responsive
      badges_position: bottom
      badges_wrap: wrap
    max_columns: 1
    path: overview
  - type: sections
    path: individual-miners
    title: Individual Miners
    icon: mdi:chip
    cards: []
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:chip
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.miner_1_wifi_signal_strength
                tap_action:
                  action: more-info
            heading: Miner 1
          - type: gauge
            entity: sensor.miner_1_power
            name: Power
            severity:
              green: 0
              yellow: 80
              red: 86
            needle: true
            min: 50
            max: 100
            grid_options:
              columns: 3
              rows: auto
          - type: gauge
            entity: sensor.miner_1_temperature
            needle: true
            severity:
              green: 0
              yellow: 60
              red: 80
            max: 100
            min: 1
            name: Temp.
            grid_options:
              columns: 3
              rows: auto
          - type: gauge
            entity: sensor.miner_1_vr_temperature
            needle: true
            severity:
              green: 0
              yellow: 70
              red: 90
            max: 110
            min: 1
            name: VR Temp.
            grid_options:
              columns: 3
              rows: auto
          - type: gauge
            entity: sensor.miner_1_fan_speed
            name: Fan Speed
            grid_options:
              columns: 3
              rows: auto
          - type: entities
            entities:
              - entity: sensor.miner_1_hashrate
                name: Hashrate
              - entity: sensor.miner_1_shares_accepted
                name: Shares Accepted
              - entity: sensor.miner_1_shares_rejected
                name: Shares Rejected
              - entity: sensor.miner_1_best_session_diff
                name: Best Session Difficulty
              - entity: sensor.miner_1_best_diff
                name: Best Difficulty
              - entity: sensor.miner_1_total_found_blocks
                name: Total Found Blocks
      - type: grid
        cards:
          - type: heading
            icon: mdi:chip
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
